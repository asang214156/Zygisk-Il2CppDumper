name: Build
on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "Package name of the game:"
        required: true
        default: "com.firsttouchgames.dls7"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # Nâng cấp lên v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4 # Nâng cấp lên v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: gradle

    - name: Setup NDK
      uses: nndk/setup-ndk@v3 # Bản v3 tương thích tốt nhất hiện nay
      with:
        ndk-version: r25c

    - name: Build with Gradle
      run: |
        chmod +x ./gradlew
        # Tự động chèn tên game vào mô tả
        sed -i 's/moduleDescription = "/moduleDescription = "(${{ github.event.inputs.package_name }}) /g' module.gradle
        # Thay đổi tên package trong mã nguồn C++
        sed -i "s/com.game.packagename/${{ github.event.inputs.package_name }}/g" module/src/main/cpp/game.h
        ./gradlew :module:assembleRelease

    - name: Upload Artifact
      uses: actions/upload-artifact@v4 # Đây là chỗ quan trọng nhất để sửa lỗi v3
      with:
        name: zygisk-il2cppdumper
        path: out/*.zip
