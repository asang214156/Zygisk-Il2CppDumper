name: Build
on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "Package name of the game:"
        required: true
        default: "com.firsttouchgames.dls7"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # Đã sửa lỗi v3 (ảnh 1)

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: gradle

    - name: Build with Gradle
      run: |
        chmod +x ./gradlew
        # Sửa thông tin module
        sed -i 's/moduleDescription = "/moduleDescription = "(${{ github.event.inputs.package_name }}) /g' module.gradle
        # Thay package name vào code C++
        sed -i "s/com.game.packagename/${{ github.event.inputs.package_name }}/g" module/src/main/cpp/game.h
        
        # GIẢI PHÁP QUYẾT ĐỊNH: Tự động tìm NDK có sẵn để tránh lỗi "Exit code 1" (ảnh 13, 14)
        export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/$(ls $ANDROID_SDK_ROOT/ndk | head -1)
        echo "Using NDK at: $ANDROID_NDK_HOME"
        
        ./gradlew :module:assembleRelease -Pandroid.ndkDirectory=$ANDROID_NDK_HOME

    - name: Upload Artifact
      uses: actions/upload-artifact@v4 # Đã sửa lỗi v3
      with:
        name: zygisk-il2cppdumper
        path: out/*.zip
