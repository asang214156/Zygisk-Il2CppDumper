name: Build
on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "Package name of the game:"
        required: true
        default: "com.firsttouchgames.dls7"

env:
  # Sửa dứt điểm lỗi ở ảnh image_59718b.jpg
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Ép Gradle dùng bộ nhớ lớn hơn để tránh NullPointer (ảnh 59db77)
  GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build with Gradle
      run: |
        chmod +x ./gradlew
        
        # Sửa package name (bước này ông luôn cần)
        sed -i "s/com.game.packagename/${{ github.event.inputs.package_name }}/g" module/src/main/cpp/game.h
        
        # RÀ SOÁT NDK: Thay vì đoán đường dẫn, ta ép Android SDK tự cập nhật bản NDK chuẩn
        # Điều này giải quyết tận gốc lỗi Exit code 1 ở ảnh image_5a47d8
        echo "y" | $ANDROID_HOME/tools/bin/sdkmanager --install "ndk;25.2.9519653"
        export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653
        
        ./gradlew :module:assembleRelease \
          -Pandroid.ndkDirectory=$ANDROID_NDK_HOME \
          --no-daemon --info
