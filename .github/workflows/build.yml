name: Build
on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "Package name of the game:"
        required: true
        default: "com.firsttouchgames.dls7"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build with Gradle
      run: |
        chmod +x ./gradlew
        
        # Tự động lấy đường dẫn NDK bản 25.x có sẵn trên GitHub Runner
        export NDK_PATH=$ANDROID_SDK_ROOT/ndk/$(ls $ANDROID_SDK_ROOT/ndk | grep "^25" | head -1)
        echo "NDK found at: $NDK_PATH"

        # Thay package name vào code
        sed -i "s/com.game.packagename/${{ github.event.inputs.package_name }}/g" module/src/main/cpp/game.h
        
        # Chạy build với đường dẫn NDK vừa tìm được
        ./gradlew :module:assembleRelease -Pandroid.ndkDirectory=$NDK_PATH

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: zygisk-il2cppdumper
        path: out/*.zip
