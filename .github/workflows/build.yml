name: Build
on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "Package name of the game:"
        required: true
        default: "com.firsttouchgames.dls7"

env:
  # Ép dùng Node 24 để sửa lỗi ở ảnh image_59718b.jpg
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build with Gradle
      run: |
        chmod +x ./gradlew
        # Sửa package name trực tiếp trong code
        sed -i "s/com.game.packagename/${{ github.event.inputs.package_name }}/g" module/src/main/cpp/game.h
        
        # Tự tìm NDK bản 25 hoặc 26 có sẵn trên máy chủ GitHub
        NDK_PATH=$ANDROID_SDK_ROOT/ndk/$(ls $ANDROID_SDK_ROOT/ndk | head -1)
        
        ./gradlew :module:assembleRelease -Pandroid.ndkDirectory=$NDK_PATH --no-daemon

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: zygisk-il2cppdumper
        path: out/*.zip
